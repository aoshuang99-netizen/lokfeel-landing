<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>LokFeel - Create Account</title>
  <meta name="description" content="Join LokFeel and start your journey to real connection.">
  <meta name="theme-color" content="#0a0a19">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
  <style>
    /* ═══════════════════════════════════════════════════
       RESET & BASE
       ═══════════════════════════════════════════════════ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ═══════════════════════════════════════════════════
       VIDEO BACKGROUND - 全浏览器兼容
       ═══════════════════════════════════════════════════ */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0a19 0%, #1a1a3e 50%, #0f0f2e 100%);
    }
    .video-bg video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      -webkit-transform: translate(-50%, -50%);
      -webkit-object-fit: cover;
      controlsList: "nodownload nofullscreen noremoteplayback";
      disablePictureInPicture: true;
      disableRemotePlayback: true;
      x5-video-player-type: "h5";
      x5-video-player-fullscreen: "true";
      x5-video-orientation: "portraint";
    }
    .video-bg video::-webkit-media-controls { display: none !important; }
    .video-bg video::-webkit-media-controls-enclosure { display: none !important; }
    .video-bg video::-webkit-media-controls-panel { display: none !important; }
    .video-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(59,130,246,0.4) 0%, rgba(99,102,241,0.25) 50%, rgba(0,0,0,0.1) 100%);
      z-index: 1;
    }
    .video-fallback {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d1b69 50%, #0a0a19 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      z-index: 0;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ═══════════════════════════════════════════════════
       NAVIGATION
       ═══════════════════════════════════════════════════ */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 48px;
      z-index: 100;
      background: rgba(10,10,25,0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      white-space: nowrap;
    }
    .logo span { color: #60a5fa; }
    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
      flex-shrink: 0;
    }
    .nav-links a {
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      opacity: 0.9;
      white-space: nowrap;
    }
    .btn-login {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.6);
      color: #fff;
      padding: 10px 24px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      min-width: 80px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.2;
    }
    .btn-signup-active {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #3b82f6;
      border: 2px solid #3b82f6;
      color: #fff;
      padding: 10px 24px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      min-width: 80px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.2;
    }

    /* ═══════════════════════════════════════════════════
       REGISTER CARD
       ═══════════════════════════════════════════════════ */
    .register-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 120px 24px 80px;
      position: relative;
      z-index: 2;
    }
    .register-card {
      background: rgba(15,15,35,0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
    }
    .register-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .register-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .register-header p {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
    }

    /* Progress bar */
    .progress-wrap { margin-bottom: 28px; }
    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }
    .progress-labels .active { color: #60a5fa; font-weight: 600; }
    .progress-bar {
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 4px;
      width: 60%;
      transition: width 0.5s ease;
    }

    /* Social Login */
    .social-login {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      width: 100%;
      white-space: nowrap;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.2;
    }
    .btn-social:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      gap: 16px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.15);
    }
    .divider span {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: rgba(255,255,255,0.85);
    }
    .form-group input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      font-size: 15px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      box-sizing: border-box;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.4); }
    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(59,130,246,0.1);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    .dob-selects {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .dob-selects select {
      width: 100%;
      padding: 13px 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      font-size: 14px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      text-align: center;
      min-height: 44px;
    }
    .dob-selects select:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(59,130,246,0.1);
    }
    .dob-selects select option { background: #1a1a2e; color: #fff; }

    .form-options {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      line-height: 1.4;
    }
    .form-options input[type='checkbox'] {
      width: 16px;
      height: 16px;
      accent-color: #3b82f6;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(59,130,246,0.35);
      min-height: 48px;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(59,130,246,0.45);
    }

    .login-link {
      text-align: center;
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      margin-top: 24px;
    }
    .login-link a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 600;
    }
    .login-link a:hover { text-decoration: underline; }

    /* Footer */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 48px;
      background: rgba(8,8,20,0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      z-index: 10;
    }

    /* ═══════════════════════════════════════════════════
       移动端适配
       ═══════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .logo { font-size: 22px; }
      .nav-links { gap: 10px; }
      .nav-links a:not(.btn-login):not(.btn-signup-active) { display: none; }
      .btn-login {
        padding: 8px 16px;
        font-size: 13px;
        min-width: 68px;
      }
      .btn-signup-active {
        padding: 8px 16px;
        font-size: 13px;
        min-width: 68px;
      }
      .register-card { padding: 32px 24px; }
      .register-header h1 { font-size: 24px; }
      .social-login { grid-template-columns: 1fr; }
      .btn-social { min-height: 44px; }
      .dob-selects { gap: 8px; }
      .dob-selects select {
        padding: 11px 6px;
        font-size: 13px;
      }
      footer { padding: 16px 20px; font-size: 12px; }
    }

    @media (max-width: 375px) {
      nav { padding: 12px 16px; }
      .logo { font-size: 20px; }
      .btn-login, .btn-signup-active { padding: 6px 12px; font-size: 12px; min-width: 58px; }
      .register-card { padding: 24px 18px; }
      .register-header h1 { font-size: 22px; }
      .form-group input { padding: 11px 14px; font-size: 14px; }
      .dob-selects select { padding: 10px 4px; font-size: 12px; }
      .btn-submit { padding: 12px; font-size: 15px; }
    }
  </style>
</head>
<body>
  <!-- Video Background - 全浏览器兼容 -->
  <div class="video-bg" id="videoBg">
    <div class="video-fallback" id="videoFallback"></div>
    <video
      id="bgVideo"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline
      x5-playsinline
      x5-video-player-type="h5"
      x5-video-player-fullscreen="true"
      preload="auto"
      style="z-index:0"
    >
      <source src="assets/video/background-mobile-720p.mp4" type="video/mp4">
      <source src="assets/video/background-desktop-1080p.webm" type="video/webm">
      <source src="assets/video/background-desktop-1080p.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
  </div>

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="logo">Lok<span>Feel</span></a>
    <div class="nav-links">
      <a href="#">About</a>
      <a href="#">Stories</a>
      <a href="#">Safety</a>
      <a href="login.html" class="btn-login">Log In</a>
      <button class="btn-signup-active">Sign Up</button>
    </div>
  </nav>

  <!-- Register Form -->
  <div class="register-container">
    <div class="register-card">
      <div class="register-header">
        <h1>Join LokFeel</h1>
        <p>Start your journey to meaningful connection</p>
      </div>

      <!-- Progress -->
      <div class="progress-wrap">
        <div class="progress-labels">
          <span class="active">Create Account</span>
          <span>Verify Email</span>
          <span>Complete Profile</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
      </div>

      <!-- Social Login -->
      <div class="social-login">
        <button type="button" class="btn-social" onclick="alert('Google OAuth')">
          <svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google
        </button>
        <button type="button" class="btn-social" onclick="alert('X OAuth 2.0')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
        </button>
      </div>

      <div class="divider">
        <span>or continue with email</span>
      </div>

      <form>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Your email" required>
        </div>
        <div class="form-group">
          <label for="dob-year">Date of Birth</label>
          <div class="dob-selects">
            <select id="dob-year" required>
              <option value="" disabled selected>Year</option>
            </select>
            <select id="dob-month" required>
              <option value="" disabled selected>Month</option>
            </select>
            <select id="dob-day" required>
              <option value="" disabled selected>Day</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min 8 characters" minlength="8" required>
        </div>
        <div class="form-options">
          <input type="checkbox" id="terms" required>
          <label for="terms" style="cursor:pointer">I agree to the <a href="#" style="color:#60a5fa">Terms</a> and <a href="#" style="color:#60a5fa">Privacy Policy</a></label>
        </div>
        <button type="submit" class="btn-submit">Send Verification Code →</button>
      </form>

      <p class="login-link">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </div>
  </div>

  <footer>
    <p>© 2026 LokFeel. Real Matches. Real Connection. No Swiping.</p>
  </footer>

  <script>
    // Populate Date of Birth selectors
    (function() {
      var yearSel = document.getElementById('dob-year');
      var monthSel = document.getElementById('dob-month');
      var daySel = document.getElementById('dob-day');

      var currentYear = new Date().getFullYear();
      for (var y = currentYear - 18; y >= 1920; y--) {
        var opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        yearSel.appendChild(opt);
      }

      var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      for (var m = 1; m <= 12; m++) {
        var opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m + ' - ' + monthNames[m - 1];
        monthSel.appendChild(opt);
      }

      for (var d = 1; d <= 31; d++) {
        var opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d;
        daySel.appendChild(opt);
      }
    })();

    // 视频兼容性脚本
    (function() {
      'use strict';
      var video = document.getElementById('bgVideo');
      var fallback = document.getElementById('videoFallback');
      if (!video) return;

      var videoLoaded = false;

      video.addEventListener('canplay', function() {
        videoLoaded = true;
        fallback.style.display = 'none';
        video.style.display = 'block';
      }, { once: true });

      video.addEventListener('error', function() {
        video.style.display = 'none';
        fallback.style.display = 'block';
      });

      video.addEventListener('pause', function() {
        if (videoLoaded) {
          video.play().catch(function() {});
        }
      });

      document.addEventListener('visibilitychange', function() {
        if (!document.hidden && videoLoaded && video.paused) {
          video.play().catch(function() {});
        }
      });

      setTimeout(function() {
        if (!videoLoaded && video.readyState === 0 && !video.currentSrc) {
          video.style.display = 'none';
          fallback.style.display = 'block';
        }
      }, 5000);

      var p = video.play();
      if (p !== undefined) {
        p.catch(function() {
          video.muted = true;
          video.play().catch(function() {
            video.style.display = 'none';
            fallback.style.display = 'block';
          });
        });
      }
    })();
  </script>
</body>
</html>
